# k8s/secret.yaml — Store API keys as Kubernetes secrets
# Apply with: kubectl apply -f k8s/secret.yaml
# Generate base64 values: echo -n "your_value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: tech-news-agent-secrets
  namespace: default
type: Opaque
data:
  GEMINI_API_KEY: <base64_encoded_value>
  GMAIL_ADDRESS: <base64_encoded_value>
  GMAIL_APP_PASSWORD: <base64_encoded_value>
  RECIPIENT_EMAIL: <base64_encoded_value>
  REDDIT_CLIENT_ID: <base64_encoded_value>
  REDDIT_CLIENT_SECRET: <base64_encoded_value>
